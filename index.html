<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>紅藍筆 · 高一生物複習</title>
<style>
  :root{
    --paper:#F6F3EB;
    --paper-2:#FBF9F3;
    --ink:#1F4E8C;         /* 藍筆：題目 */
    --ink-deep:#16305C;
    --ink-faint:#5B6B84;
    --red:#C62828;         /* 紅筆：答案 */
    --red-soft:#E0574F;
    --film:rgba(214,55,48,.90);
    --hl:#FFE86B;          /* 螢光筆 */
    --green:#2E7D5B;
    --rule:rgba(31,78,140,.10);
    --line:rgba(31,78,140,.16);
    --shadow:0 1px 2px rgba(22,48,92,.06),0 6px 18px rgba(22,48,92,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink-deep);
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    font-size:16px;line-height:1.6;
    /* faint ruled paper */
    background-image:linear-gradient(var(--rule) 1px,transparent 1px);
    background-size:100% 30px;
    background-attachment:fixed;
    padding-bottom:60px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 14px}

  /* ---- header ---- */
  header{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,var(--paper) 72%,rgba(246,243,235,.0));
    padding-top:max(10px,env(safe-area-inset-top));
    backdrop-filter:blur(2px);
  }
  .brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:6px 0 10px}
  .brand h1{
    font-size:22px;margin:0;letter-spacing:.5px;font-weight:800;
    color:var(--ink-deep);
  }
  .brand h1 .b{color:var(--ink)}
  .brand h1 .r{color:var(--red)}
  .brand .sub{font-size:12.5px;color:var(--ink-faint);font-weight:500}

  /* exam tabs */
  .tabs{display:flex;gap:8px}
  .tab{
    flex:1;border:1.5px solid var(--line);background:var(--paper-2);
    color:var(--ink-faint);border-radius:12px 12px 4px 4px;
    padding:9px 6px 8px;font-size:14.5px;font-weight:700;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.25;
    transition:.15s;
  }
  .tab small{font-size:10.5px;font-weight:600;opacity:.75}
  .tab.on{
    background:var(--ink);color:#fff;border-color:var(--ink);
    box-shadow:var(--shadow);
  }
  .tab.on small{color:#dCe6f5;opacity:1}

  /* control bar */
  .controls{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    margin:12px 0 4px;padding:10px 12px;
    background:var(--paper-2);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);
  }
  .film-toggle{
    display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
    font-weight:700;font-size:13.5px;color:var(--red);
  }
  .switch{
    width:44px;height:25px;border-radius:20px;background:var(--red);
    position:relative;transition:.2s;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);
  }
  .switch::after{content:"";position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;
    border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .film-toggle.off .switch{background:#C3CBD8}
  .film-toggle.off .switch::after{left:21.5px}
  .film-toggle.off{color:var(--ink-faint)}
  .spacer{flex:1}
  .score{font-size:13px;color:var(--ink-faint);font-weight:600;white-space:nowrap}
  .score b{color:var(--green);font-size:15px}
  .score .w{color:var(--red)}
  .mini{
    border:1px solid var(--line);background:var(--paper);border-radius:9px;
    padding:6px 10px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;
  }
  .mini.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .filters{display:flex;gap:6px;width:100%;margin-top:2px}
  .filters .mini{flex:1;text-align:center}

  /* progress bar */
  .bar{height:6px;border-radius:6px;background:var(--line);overflow:hidden;width:100%;margin-top:6px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--ink),var(--green));transition:.35s}

  /* section heading */
  .sec{
    font-size:13px;font-weight:800;color:var(--ink);letter-spacing:1px;
    margin:22px 4px 8px;display:flex;align-items:center;gap:8px;
  }
  .sec::before{content:"";width:6px;height:16px;border-radius:2px;background:var(--red)}
  .passage{
    background:var(--paper-2);border:1px dashed var(--line);border-left:4px solid var(--ink);
    border-radius:10px;padding:10px 13px;margin:0 0 12px;font-size:13.5px;color:var(--ink-faint);
    line-height:1.65;
  }
  .passage b{color:var(--ink-deep)}

  /* ---- question card ---- */
  .q{
    background:var(--paper-2);border:1px solid var(--line);border-radius:14px;
    padding:14px 15px 15px;margin:0 0 14px;box-shadow:var(--shadow);position:relative;
  }
  .q.hide{display:none}
  .q .no{
    display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;
    padding:0 7px;border-radius:8px;background:var(--ink);color:#fff;font-weight:800;font-size:13px;
    margin-right:8px;vertical-align:2px;
  }
  .q .tag{
    font-size:10.5px;font-weight:700;color:var(--ink-faint);border:1px solid var(--line);
    border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:2px;background:var(--paper)
  }
  .q .tag.multi{color:var(--red);border-color:rgba(198,40,40,.35)}
  .stem{font-size:15.5px;color:var(--ink-deep);font-weight:500}
  /* 紅藍筆底線 */
  u.ur,u.ub{text-decoration:none;padding-bottom:1px;font-weight:600}
  u.ur{border-bottom:2.5px solid var(--red)}
  u.ub{border-bottom:2.5px solid var(--ink)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-faint);
    padding:2px 2px 10px;font-weight:600;align-items:center}
  .legend u{font-weight:700}
  .legend .lg-r{color:var(--red)}

  .opts{margin:11px 0 0;display:flex;flex-direction:column;gap:7px}
  .opt{
    display:flex;gap:9px;align-items:flex-start;text-align:left;
    border:1.5px solid var(--line);background:var(--paper);border-radius:10px;
    padding:9px 11px;font-size:14.5px;color:var(--ink-deep);cursor:pointer;transition:.12s;font-family:inherit;line-height:1.5;
  }
  .opt .k{font-weight:800;flex:none;color:var(--ink-faint)}
  .opt:active{transform:scale(.995)}
  .opt.pick{border-color:var(--ink);background:rgba(31,78,140,.07);color:var(--ink-deep)}
  .opt.pick .k{color:var(--ink)}
  /* graded */
  .opt.correct{border-color:var(--green);background:rgba(46,125,91,.12)}
  .opt.correct .k{color:var(--green)}
  .opt.correct::after{content:"✓";margin-left:auto;color:var(--green);font-weight:800}
  .opt.badpick{border-color:var(--red);background:rgba(198,40,40,.10)}
  .opt.badpick .k{color:var(--red)}
  .opt.badpick::after{content:"✕";margin-left:auto;color:var(--red);font-weight:800}
  .graded .opt{cursor:default}

  .qbtns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .reveal{
    border:none;background:var(--red);color:#fff;font-weight:800;font-size:14px;
    border-radius:10px;padding:9px 16px;cursor:pointer;font-family:inherit;
    box-shadow:0 2px 8px rgba(198,40,40,.28);
  }
  .reveal.small{background:var(--ink);box-shadow:0 2px 8px rgba(31,78,140,.22)}
  .reveal:active{transform:translateY(1px)}

  /* ---- answer under the red film ---- */
  .ans{margin-top:12px;border-radius:11px;overflow:hidden;position:relative}
  .film{
    background:
      repeating-linear-gradient(45deg,rgba(255,255,255,.10) 0 10px,transparent 10px 20px),
      var(--film);
    color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;
    padding:16px;text-align:center;cursor:pointer;border-radius:11px;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .film small{font-weight:600;opacity:.85;letter-spacing:0}
  .ans.open .film{display:none}
  .ans-body{display:none;padding:13px 14px;background:rgba(198,40,40,.055);
    border:1px solid rgba(198,40,40,.25);border-radius:11px}
  .ans.open .ans-body{display:block;animation:lift .28s ease both}
  @keyframes lift{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .ans-key{color:var(--red);font-weight:800;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ans-key .lab{font-size:11px;font-weight:700;color:#fff;background:var(--red);padding:2px 8px;border-radius:6px;letter-spacing:1px}
  .explain{color:#7a2a26;font-size:14px;line-height:1.68}
  .explain b{color:var(--red)}

  .selfmark{display:flex;gap:8px;margin-top:11px}
  .selfmark button{
    flex:1;border:1.5px solid var(--line);background:var(--paper);border-radius:9px;
    padding:8px;font-weight:800;font-size:13.5px;cursor:pointer;font-family:inherit;color:var(--ink-faint)
  }
  .selfmark button.got{color:var(--green)}
  .selfmark button.got.on{background:var(--green);color:#fff;border-color:var(--green)}
  .selfmark button.miss{color:var(--red)}
  .selfmark button.miss.on{background:var(--red);color:#fff;border-color:var(--red)}

  .empty{text-align:center;color:var(--ink-faint);padding:40px 10px;font-size:14px}
  footer{text-align:center;color:var(--ink-faint);font-size:11.5px;padding:24px 10px 6px;line-height:1.7}
  @media (max-width:420px){
    .brand h1{font-size:19px}
    .tab{font-size:13px}
    .stem{font-size:15px}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <h1><span class="r">紅</span><span class="b">藍</span>筆生物</h1>
      <span class="sub">中山女中 · 114-2 高一生物</span>
    </div>
    <div class="legend">
      <span><u class="ur">紅線</u>＝題目在問什麼</span>
      <span><u class="ub">藍線</u>＝關鍵字</span>
      <span class="lg-r">🔴 點膠片翻答案</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="controls">
      <div class="film-toggle" id="filmToggle" title="蓋上/掀開全部答案">
        <span class="switch"></span><span id="filmLabel">紅膠片：蓋著</span>
      </div>
      <div class="spacer"></div>
      <div class="score" id="score"></div>
      <div class="filters">
        <button class="mini on" data-f="all">全部</button>
        <button class="mini" data-f="todo">未作答</button>
        <button class="mini" data-f="wrong">答錯的</button>
        <button class="mini" data-f="reset">重設本卷</button>
      </div>
      <div class="bar"><i id="prog"></i></div>
    </div>
  </div>
</header>

<main class="wrap" id="main"></main>
<footer>紅藍筆讀題法：<u class="ur">紅底線</u>看清楚題目在問什麼、<u class="ub">藍底線</u>抓關鍵字，先自己想，再點紅膠片對答案 ✏️<br>底線由系統自動標記，資料整理自三份段考詳解，如有出入以老師公布答案為準。</footer>

<script>
/* ============ 題庫 ============ */
/* type: 'single' 單選 / 'multi' 多選 / 'fill' 非選/計算（只掀答案）*/
const EXAMS = {
  e1:{ name:"第一次段考", sub:"細胞・能量・分裂", questions:[
    {no:1,type:"single",stem:"下列哪一種構造在人體細胞及大腸桿菌中皆可發現？",o:{A:"質體",B:"高基氏體",C:"核糖體",D:"溶體"},a:["C"],ex:"所有生物都具有染色體與核糖體。"},
    {no:2,type:"single",stem:"大腸桿菌的大小（直徑）和下列哪一個構造最接近？",o:{A:"核糖體",B:"蛋白質",C:"病毒",D:"粒線體"},a:["D"],ex:"依內共生假說，粒線體與葉綠體的前身都是細菌，尺寸與大腸桿菌相近。"},
    {no:3,type:"single",stem:"關於大腸桿菌分泌的維生素，下列敘述何者正確？",o:{A:"是人體無法自行合成的無機物",B:"是能供應能量的有機物",C:"是不須消化即可吸收的有機小分子",D:"維生素B主要在鞏固骨骼與牙齒的結構"},a:["C"],ex:"(A)維生素是有機物；(B)供能的是醣類、脂質、蛋白質；(D)鞏固骨骼與牙齒主要靠鈣質。大腸不具消化功能，故維生素不須消化即可吸收。"},
    {no:4,type:"single",stem:"一份麻辣鴨血臭豆腐中，含量最高的主要營養物質是哪一類（不含調味料）？",o:{A:"醣類",B:"脂質",C:"纖維素",D:"蛋白質"},a:["D"],ex:"奶、蛋、魚、肉、豆屬於蛋白質類營養物質。"},
    {no:5,type:"single",stem:"（細胞膜構造圖）有辦法分辨細胞膜的外側或內側嗎？根據什麼判斷？",o:{A:"無法分辨",B:"可以，根據甲所在的位置",C:"可以，根據乙所在的位置",D:"可以，根據丙的方向"},a:["C"],ex:"細胞膜一側凸起的鏈狀構造為醣類（乙），醣分子出現在細胞膜外側供免疫系統辨識。"},
    {no:6,type:"single",stem:"圖中丙為磷脂雙層膜，下列哪一種真核細胞構造的膜層數與另3者不同？",o:{A:"細胞膜",B:"細胞核",C:"葉綠體",D:"粒線體"},a:["A"],ex:"細胞核、葉綠體、粒線體皆為雙層膜，僅細胞膜為單層膜。"},
    {no:7,type:"single",stem:"細胞膜上的甲乙丙丁不含下列哪一種有機物質？",o:{A:"醣類",B:"蛋白質",C:"脂質",D:"核酸"},a:["D"],ex:"膜狀構造含醣類、脂質、蛋白質三大類，不含核酸。"},
    {no:8,type:"single",stem:"普通小麥體細胞有42條染色體。有絲分裂前期，染色體的量詞敘述何者正確？",o:{A:"DNA 42、染色體42、二分體42、無姊妹染色分體",B:"DNA 84、染色體42、二分體42、姊妹染色分體84",C:"DNA 84、染色體84、二分體84、姊妹染色分體84",D:"DNA 42、染色體84、二分體42、姊妹染色分體42"},a:["B"],ex:"複製後未分離前仍算同一條→染色體數與二分體數不變＝42；每條二分體含2條姊妹染色分體＝84；DNA分子數＝84。"},
    {no:9,type:"single",stem:"小麥細胞進行減數分裂，第一次分裂前期最多可形成多少個四分體？",o:{A:"21",B:"42",C:"84",D:"168"},a:["A"],ex:"42÷2＝21對同源染色體，故形成21個四分體。"},
    {no:10,type:"single",stem:"某細胞2n=6，進行減數分裂至第二次分裂末期時，每一子細胞的染色體數與DNA分子數分別為？",o:{A:"3，3",B:"3，6",C:"6，6",D:"6，3"},a:["A"],ex:"減二末期染色體剩單套n、姊妹染色分體已分離，故染色體數與DNA數皆為 n＝3。"},
    {no:11,type:"single",stem:"巴拉刈在光合作用中攔截原本要傳給其他分子的電子。下列敘述何者正確？",o:{A:"植物即便在陽光下，也無法合成出足夠的ATP與NADH",B:"只抑制光反應，不會影響固碳反應",C:"主要抑制水的氧化，使光反應無法開始",D:"被噴灑的植物將無法有效進行醣類的合成"},a:["D"],ex:"(A)光反應產物應為NADPH（用詞錯）；(B)固碳需光反應能量，故也受影響；(C)它不破壞葉綠素，而是阻礙電子傳遞。故(D)正確。"},
    {no:12,type:"single",stem:"邦克列酸抑制ANT，使ATP無法離開粒線體基質。下列何者正確？",o:{A:"因ATP合酶被破壞而無法產生ATP",B:"肌肉收縮、神經傳導、蛋白質合成等高耗能機制受影響最嚴重",C:"直接影響電子傳遞鏈",D:"ATP不論動植物細胞都只由粒線體生成"},a:["B"],ex:"邦克列酸作用對象是ANT（非ATP合酶、非電子傳遞鏈）；細胞質糖解也能產ATP。高耗能細胞受影響最嚴重。"},
    {no:13,type:"single",stem:"下列有關粒線體呼吸作用的敘述，何者『錯誤』？",o:{A:"原核生物無法透過粒線體行呼吸作用",B:"糖解作用是所有細胞共同具有的代謝途徑",C:"粒線體內膜為有氧呼吸的關鍵構造",D:"因O₂參與糖解作用，故稱有氧呼吸"},a:["D"],ex:"O₂參與的是粒線體中丙酮酸分解為CO₂的過程，並非糖解作用，故(D)敘述錯誤。"},
    {no:14,type:"single",stem:"碳奈米管植入葉綠體提升光合效率。下列敘述何者正確？",o:{A:"可取代類囊體上的光合色素，擴大可吸收光譜",B:"使類囊體膜上的電子傳遞效率提升，產生更多ATP",C:"光反應只能白天、固碳反應主要於夜晚進行",D:"擴大吸收光譜可提高紫外線耐受性"},a:["B"],ex:"文中只說「擴大」吸收光譜而非「取代」；固碳需光反應能量、非夜間；擴大光譜是為利用能量而非增加耐受性。"},
    {no:15,type:"single",stem:"（承上）飽和光照下比較一般葉綠體與植入碳奈米管葉綠體在不同CO₂濃度下的表現，何者最正確？",o:{A:"CO₂濃度極低時，兩者光合速率會趨於一致",B:"因電子傳遞加快，固碳反應不再需要酵素",C:"電子流增加49%會使產生的氧氣量下降",D:"無可見光但有近紅外光時仍可合成葡萄糖"},a:["A"],ex:"代謝幾乎都需酵素；(C)(D)文中無此描述。CO₂極低時受固碳限制，兩者速率會趨於一致。"},
    /* 多選 */
    {no:16,type:"multi",sec:"多選題",stem:"甲、乙為與能量轉換有關的胞器，圖甲B為堆疊扁囊。下列哪些正確？",o:{A:"甲乙兩胞器均可合成ATP",B:"原核生物因沒有乙胞器，所以無法行有氧呼吸",C:"B的膜上具有光合色素",D:"乙中進行有氧呼吸可產生水分子",E:"原核生物因沒有甲胞器，所以無法行光合作用"},a:["A","C","D"],ex:"(B)(E)原核生物可利用細胞膜行有氧呼吸，同理也能行光合作用（如藍綠菌）。"},
    {no:17,type:"multi",stem:"下列關於生物各種構造不同尺度的描述，哪些正確？",o:{A:"表面積：一個人類紅血球 ＞ 一隻藍綠菌",B:"數量：中心體 ＞ 粒線體",C:"體積：一個人類精子 ＜ 一個人類卵",D:"直徑：核糖體 ＞ 葉綠體",E:"質量：一個細菌的染色體 ＞ 一個細菌的質體"},a:["A","C","E"],ex:"(B)中心體最多兩顆，粒線體可達數百上千個；(D)膜狀構造（葉綠體）遠大於無膜的核糖體。"},
    {no:18,type:"multi",stem:"光合作用速率與環境因子關係圖（曲線①②），下列推論哪些正確？",o:{A:"X軸為光強度時，①②可代表同株植物在不同CO₂濃度下的速率",B:"X軸為光強度時，②在高光下有較高的最大光合速率",C:"縱軸可用「單位時間內氧氣的消耗量」衡量",D:"X軸為CO₂濃度、濃度a時，光強度可能為限制因子",E:"X軸為CO₂濃度時，只要CO₂足夠，溫度越高越有助於光合速率"},a:["A","B","D"],ex:"(C)應以CO₂消耗量或氧氣「生成量」衡量；(E)過高溫度會破壞酵素、降低反應。"},
    {no:19,type:"multi",stem:"下列有關光合作用的敘述哪些『錯誤』？",o:{A:"光反應在類囊體膜進行，固碳反應發生於類囊體基質中",B:"光反應將光能轉為化學能",C:"CO₂的碳被固定合成醣類，CO₂的氧則以O₂形式釋出",D:"其他有機物如蛋白質與脂質仍需透過根部吸收",E:"類囊體膜含葉綠素、葉黃素、類胡蘿蔔素等光合色素"},a:["A","C","D"],ex:"錯誤者：(A)固碳在「葉綠體」基質；(C)釋出的O₂來自水的分解；(D)蛋白質與脂質由醣類轉化而來。"},
    {no:20,type:"multi",stem:"下列關於細胞週期的敘述，哪些正確？",o:{A:"分裂期總時間較間期長",B:"分裂期總時間較間期短",C:"細胞的分裂含細菌分裂與體細胞分裂，不含減數分裂",D:"濃縮的染色體出現在DNA複製後的分裂期前期",E:"細胞週期是細胞從分裂後到凋亡的過程"},a:["B","D"],ex:"(A)間期遠大於分裂期；(C)三者都屬細胞分裂；(E)細胞週期是分裂後到下次分裂的歷程。"},
    {no:21,type:"multi",stem:"關於動物減數分裂及配子形成，下列敘述哪些正確？",o:{A:"精子與卵的形成都須經過兩次細胞分裂",B:"每一對同源染色體都必須分離到不同子細胞",C:"初級精母或初級卵母細胞其一的染色體數為4n",D:"人類卵形成產生一個大卵與3個小極體",E:"人類在睪丸與卵巢中完成兩次減數分裂"},a:["A","B"],ex:"(C)兩者皆為2n；(D)人類卵只產生兩個極體；(E)雌性以次級卵母細胞排卵，受精後才行第二次減數分裂。"},
    {no:22,type:"multi",stem:"有關顯微鏡與細胞學說發展史，下列敘述哪些正確？",o:{A:"虎克發明顯微鏡並將軟木栓樣本命名為細胞",B:"雷文霍克用更高倍率顯微鏡觀察到細菌等微生物",C:"許旺與許來登提出「生物體都由細胞組成」學說",D:"虎克對波以耳定律與虎克定律均有貢獻",E:"魏修在1930年代發明電子顯微鏡"},a:["B","C","D"],ex:"(A)虎克是改良而非發明顯微鏡；(E)電子顯微鏡並非魏修發明。"},
    {no:23,type:"multi",stem:"以下哪些構造『無法』用學校的光學顯微鏡觀察到（可染色）？",o:{A:"冠狀病毒",B:"葉綠體",C:"核糖體",D:"紡錘體",E:"細胞膜的磷脂分子"},a:["A","C","E"],ex:"分子層次或過小的構造無法以光學顯微鏡觀察，如病毒、核糖體、磷脂分子。"},
    /* 閱讀題 */
    {no:24,type:"single",sec:"閱讀題",pass:"題組一〈細胞內的遠古房客〉：內共生學說主張真核細胞某些胞器起源於被吞噬的原核生物。附表比較粒線體/葉綠體、真核細胞、細菌的核糖體沉降係數、抗生素敏感性、分裂方式、染色體形狀。",stem:"下列哪一項特徵最能作為粒線體起源於原核生物的有力證據？",o:{A:"具有單層膜構造",B:"具有細胞壁成分",C:"具有多條線型DNA",D:"具有自己的核糖體"},a:["D"],ex:"粒線體有自己的核糖體，且成分與細菌較為相似。"},
    {no:25,type:"single",stem:"「基因水平轉移」發生在粒線體演化成胞器時，下列推論何者最合理？",o:{A:"早期粒線體仍具合成細胞壁的所有酵素",B:"粒線體在宿主外獨立生存的能力提升",C:"宿主細胞可透過核基因調節粒線體的代謝",D:"宿主細胞DNA總量會因轉移而逐漸減少"},a:["C"],ex:"粒線體不具細胞壁；獨立生存能力逐步下降；宿主DNA因基因轉入而漸增。"},
    {no:26,type:"single",stem:"比較「色素體」與「葉綠體」，下列敘述何者最正確？",o:{A:"兩者皆具有兩層膜",B:"兩者皆起源於紫細菌",C:"兩者皆不含任何DNA",D:"兩者皆含有肽聚醣成分"},a:["A"],ex:"兩者皆起源於藍綠菌、皆含獨立DNA、皆不具細胞壁（肽聚醣）。"},
    {no:27,type:"single",stem:"演化歷程中，下列事件先後順序何者最符合共識？甲：吞噬好氧細菌 乙：產生核膜與內質網 丙：吞噬藍綠菌",o:{A:"甲→乙→丙",B:"乙→甲→丙",C:"乙→丙→甲",D:"丙→乙→甲"},a:["B"],ex:"先形成真核細胞（乙），再吞噬好氧細菌（甲）成粒線體，之後吞噬藍綠菌（丙）成葉綠體。"},
    {no:28,type:"single",pass:"題組二〈發酵作用〉：高濃度單一糖時發酵速率 果糖＞蔗糖＞葡萄糖；糖濃度低於某值時 葡萄糖＞蔗糖＞果糖。同時含多糖時酵母菌優先利用葡萄糖（分解代謝物抑制）。",stem:"關於單一碳源對酵母菌發酵速率的影響，下列何者正確？",o:{A:"無論糖濃度高低，葡萄糖始終最快",B:"糖重量百分比4.55%時，速率為 果糖＞蔗糖＞葡萄糖",C:"蔗糖分子較大，所有濃度下皆最慢",D:"糖濃度低於0.71%時，果糖效率會顯著超越葡萄糖"},a:["B"],ex:"0.25g以上濃度果糖較快；蔗糖始終居中；0.71%以下時反而葡萄糖高於果糖。"},
    {no:29,type:"single",stem:"關於「分解代謝物抑制」，下列推論何者最合理？",o:{A:"同時存在多糖時，酵母菌優先利用能最快產能的葡萄糖",B:"優先利用路徑最短的果糖",C:"為了同時分解所有糖類以獲取最大能量",D:"僅發生在極高濃度糖類環境"},a:["A"],ex:"符合文章敘述：多糖並存時優先利用葡萄糖。"},
    {no:30,type:"single",pass:"題組三〈乳酸菌〉：乳酸菌分解乳糖產乳酸使pH下降、酪蛋白凝集。保加利亞桿菌難在大腸長期駐紮。",stem:"根據上述對乳酸菌的敘述，何者正確？",o:{A:"牛奶變酸使酪蛋白帶正電而凝固",B:"喝優酪乳不腹瀉，是因乳酸菌把乳糖轉成酪蛋白",C:"乳酸使pH下降並抑制其他細菌，改變腸道菌相",D:"保加利亞桿菌雖是好菌，但在消化道僅是過客難久留"},a:["D"],ex:"酸度增加使酪蛋白失去負電荷而凝集；乳酸菌是把乳糖轉成乳酸；(C)文中未提及。"},
    {no:31,type:"single",stem:"針對「乳酸發酵」，下列生化反應敘述何者最正確？",o:{A:"分解乳糖產能，過程中不需經過糖解作用",B:"有氧環境下會轉行有氧呼吸產生更多乳酸",C:"乳酸發酵與有氧呼吸皆能產生CO₂",D:"肌肉細胞在缺氧時也會進行乳酸發酵"},a:["D"],ex:"醣類產能都會經糖解；乳酸發酵發生於低氧；乳酸發酵不產CO₂（酒精發酵才會）。"},

    {no:32,type:"fill",sec:"混合題（非選）",stem:"寫出細胞結構圖中 A～E 的胞器名稱。",atext:"A：中央液胞　B：粒線體　C：葉綠體　D：內質網　E：高基氏體",ex:""},
    {no:33,type:"fill",stem:"呼吸作用示意圖：寫出甲乙丙丁的作用名稱與 V W X Y Z 的物質名稱。",atext:"甲 糖解作用｜乙 有氧呼吸｜丙 酒精發酵｜丁 乳酸發酵。V 丙酮酸｜W 酒精｜X CO₂｜Y H₂O｜Z 乳酸",ex:""},

  e2:{ name:"第二次段考", sub:"遺傳・玻片・染色體", questions:[
    {no:1,type:"single",stem:"（實驗室規範）以下描述何者最正確？",o:{A:"嚴禁攜帶手機進入實驗室場域",B:"帶食物進實驗室情有可原，放抽屜就好",C:"手搖飲不健康，應自備飲水放實驗桌",D:"為避免不必要的干擾，最好將過肩長髮束起"},a:["D"],ex:"過肩長髮應束起以免沾染藥品或被酒精燈引燃；實驗室嚴禁飲食、桌上禁放飲水。"},
    {no:2,type:"single",stem:"想觀察馬鈴薯芽體或發綠延伸到塊莖內部的範圍，用何種玻片製作方式最佳？",o:{A:"徒手切片法",B:"折撕法",C:"壓片法",D:"抹片法"},a:["A"],ex:"壓片、抹片會破壞細胞排列，折撕僅適用表皮，觀察塊莖內部以徒手切片最佳。"},
    {no:3,type:"single",stem:"塊莖大小受三個基因調控且顯性等位基因具累加性，下列何者與 AABbcc 重量相同？",o:{A:"AaBbCc",B:"AaBbcc",C:"AABBCC",D:"AABBcc"},a:["A"],ex:"顯性等位基因數相同即表現相同。AABbcc有3個顯性基因，AaBbCc同為3個。"},
    {no:4,type:"single",stem:"各顯性等位基因貢獻量相等，aabbCc為9g、AABBCc為17g，問 AABbcc 應多重？",o:{A:"6g",B:"8g",C:"13g",D:"15g"},a:["C"],ex:"兩者差4個顯性基因、差8g→每個顯性＋2g。AABbcc比aabbCc多2個顯性＝9＋2×2＝13g。"},
    {no:5,type:"single",stem:"AaBbCc 與 AaBBcc 雜交，子代有幾種表現型？",o:{A:"4種",B:"5種",C:"8種",D:"12種"},a:["B"],ex:"總顯性基因數最小1、最大5，可能為1~5，共5種表現型。"},
    {no:6,type:"single",stem:"（承上）AaBbCc 與 AaBBcc 雜交，子代有幾種基因型？",o:{A:"4種",B:"5種",C:"8種",D:"12種"},a:["D"],ex:"A：AA/Aa/aa（3）× B：BB/Bb（2）× C：Cc/cc（2）＝12種。"},
    {no:7,type:"single",stem:"關於玻片製作方式與注意事項，何者正確？",o:{A:"徒手切片切越大塊越有利觀察",B:"折撕法都是由上往下折再撕開",C:"壓片法用蓋玻片與載玻片夾住樣本施力壓扁",D:"血液抹片只能單方向推送，來回移動不利細胞分散"},a:["D"],ex:"切片應越薄越好；折撕應朝外折後斜向撕表皮；壓片宜墊濾紙均勻施壓，勿硬壓。"},
    {no:8,type:"single",stem:"關於顯微鏡操作，何者正確？",o:{A:"切到400倍要先降載物台再轉入40倍物鏡以免壓破樣本",B:"高倍鏡亮度足但輪廓不清時，應將光圈調小",C:"不論倍率高低都應先用粗調節輪快速調整",D:"對焦應將載物台由最低處慢慢往高處調升"},a:["B"],ex:"光圈調小可增加對比與景深使輪廓清晰。切換高倍不需降載物台；高倍禁用粗調節輪；對焦由物鏡最低處往上調（或側看）。"},
    {no:9,type:"single",stem:"關於遺傳學發展史，下列何者最符合史實？",o:{A:"孟德爾提出遺傳因子並認為其移動與染色體相似",B:"華生與克里克根據減數分裂提出染色體學說",C:"摩根透過科學方法實際證明遺傳因子就在染色體上",D:"薩登與包法利透過推論認定遺傳因子就在DNA上"},a:["C"],ex:"摩根以果蠅（性聯遺傳）證明基因位於染色體上；孟德爾時代未知染色體；染色體學說由薩登與包法利提出。"},
    {no:10,type:"single",stem:"關於「遺傳的染色體學說」，下列敘述何者正確？",o:{A:"同源染色體在減數分裂的分離對應孟德爾分離律",B:"等位基因與染色體移動方式相同，所以是相同概念",C:"染色體由DNA纏繞於蛋白質上所形成",D:"所有性狀都符合染色體學說預測的獨立分配律"},a:["A"],ex:"同源染色體分離的行為與孟德爾分離律高度平行；(B)行為相似非相同概念；(C)屬化學組成非學說核心；(D)連鎖基因不符獨立分配。"},
    {no:11,type:"single",stem:"分離律與獨立分配律分別對應到減數分裂的哪個時期？",o:{A:"分離律—第1階段；獨立分配律—第1階段",B:"分離律—第1階段；獨立分配律—第2階段",C:"分離律—第2階段；獨立分配律—第1階段",D:"分離律—第2階段；獨立分配律—第2階段"},a:["A"],ex:"兩者皆對應減數分裂第一階段（同源染色體分離、非同源染色體隨機排列）。"},
    {no:12,type:"single",stem:"莫納皮拉韋結構模仿胞嘧啶或尿嘧啶，其模擬的結構佔人體含氮鹼基種類的幾分之幾？",o:{A:"2/4",B:"2/5",C:"2/6",D:"2/8"},a:["B"],ex:"人體含氮鹼基共5種（A、T、C、G、U）；模擬C與U兩種，故為 2/5。"},
    {no:13,type:"single",stem:"關於溝鼠性狀與表徵的描述與推論，何者正確？",o:{A:"毛色為完全顯性，所以黑色相較褐色為顯性",B:"純品系捲毛與短毛雜交產生微捲毛子代，屬共顯性",C:"攻擊性屬多基因控制，所以攻擊性極強的個體只是少數",D:"毛色基因Agouti有四型，因此屬於多基因遺傳"},a:["C"],ex:"多基因遺傳呈常態分佈，極端表現個體佔少數。(A)需實驗證明；(B)中間型屬不完全顯性；(D)單基因座多型屬複等位基因。"},
    {no:14,type:"single",stem:"關於 DNA 與 RNA 的比較，何者正確？",o:{A:"兩者區別只在含氮鹼基，一個T一個U",B:"DNA多為雙股螺旋，RNA必為單股螺旋",C:"兩者都由五碳醣直接組合而成",D:"構成RNA的其中一種基本單元可合成能量貨幣ATP"},a:["D"],ex:"腺嘌呤核糖核苷酸（AMP）可磷酸化成ATP。(A)五碳醣也不同；(B)RNA通常單股「線狀」；(C)基本單元是核苷酸。"},
    {no:15,type:"single",stem:"選擇遺傳學實驗材料時應考慮何種條件？",o:{A:"最好是世代短、子代多、好飼養",B:"性狀變化多樣，有利找尋素材",C:"性狀具連續性且易於判讀",D:"自然狀態下異花授粉有利雜交"},a:["A"],ex:"性狀應對比明顯且穩定；孟德爾成功關鍵是選「不連續」性狀；自然自花授粉利於培育純品系。"},
    {no:16,type:"single",stem:"個體基因型 AaBbCCDd，進行試交實驗，「雙親」總共能產生幾種配子？",o:{A:"6種",B:"7種",C:"8種",D:"9種"},a:["D"],ex:"待測親代3對異型合子→2×2×1×2＝8種；隱性純合子 aabbccdd→1種。合計8＋1＝9種。"},
    {no:17,type:"single",stem:"鹼基名稱與英文簡寫的對應關係，何者正確？",o:{A:"A—胸腺嘧啶",B:"T—腺嘧啶",C:"C—胞嘧啶",D:"G—鳥糞嘧啶"},a:["C"],ex:"A是腺嘌呤、T是胸腺嘧啶、G是鳥嘌呤；C為胞嘧啶正確。"},
    /* 多選 */
    {no:18,type:"multi",sec:"多選題",stem:"家族性高膽固醇血症（FH）：同型合子LDL>400、異型合子約200、無FH<100。下列敘述哪些正確？",o:{A:"以LDL數值為指標，此遺傳模式為中間型遺傳",B:"以190mg/dL為高/低風險分界，可視為完全顯性遺傳",C:"LDL為連續分布，故推論為多基因遺傳",D:"以260mg/dL以上為超高風險，其出現機率接近隱性遺傳模式",E:"FH與LDL同時表現，故屬共顯性"},a:["A","B","D"],ex:"異型合子(200)介於兩同型合子之間→中間型；以190分界則異型與FH同型皆高風險→像完全顯性；260以上僅FH同型(約1/4)→似隱性。(C)為單一基因非多基因；(E)濃度中間化非共顯性。"},
    {no:19,type:"multi",stem:"以下關於性狀與表徵的描述，哪些正確？",o:{A:"色盲是表徵",B:"膚色是性狀",C:"髮型是性狀",D:"美人尖是性狀",E:"身高是表徵"},a:["A","B"],ex:"性狀是大分類、表徵是具體表現。色盲是表徵、膚色是性狀。(C)髮型受後天影響；(D)有無美人尖才是性狀；(E)身高是性狀，「170cm」才是表徵。"},
    {no:20,type:"multi",stem:"雞羽色 BB黑/BB'藍/B'B'白，雞冠 C豆冠(多)/c單冠。單冠白色母雞(ccB'B')生下小雞性狀比例1:1，公雞可能的表現型？",o:{A:"豆冠黑色",B:"豆冠白色",C:"單冠藍色",D:"單冠白色",E:"單冠黑色"},a:["A","B","C"],ex:"公雞基因型可能為 CcBB(豆冠黑)、CcB'B'(豆冠白)、ccB'B(單冠藍)、CCB'B(豆冠藍)。對應選項為豆冠黑、豆冠白、單冠藍。"},
    {no:21,type:"multi",stem:"（承上）一窩小雞表現型接近 1:2:1，親代可能是哪些組合？",o:{A:"豆冠藍色 × 單冠藍色",B:"豆冠藍色 × 豆冠藍色",C:"單冠藍色 × 單冠藍色",D:"豆冠黑色 × 單冠白色",E:"豆冠黑色 × 單冠黑色"},a:["A","B","C"],ex:"1:2:1 來自羽色不完全顯性 BB'×BB' 且冠型須一致（豆×豆、豆×單、單×單皆可）。關鍵在雙親都是藍色即可，故A、B、C。"},
    {no:22,type:"multi",stem:"以下關於遺傳物質的描述，哪些正確？",o:{A:"核酸中嘌呤數量對嘧啶數量都一樣",B:"所有核酸的A與T、C與G的量都接近一致",C:"核苷酸在人體中一共有8種",D:"人體核苷酸中的含氮鹼基一共只有5種",E:"五碳醣一共有2種"},a:["C","D","E"],ex:"(A)(B)僅適用雙股DNA，單股DNA或RNA不一定，且RNA無T。核苷酸8種、含氮鹼基5種、五碳醣2種皆正確。"},
    {no:23,type:"multi",stem:"哪些學生有明顯理由可推論與父母其中一方沒有血緣關係？",o:{A:"雙眼皮的小強，雙親都是單眼皮",B:"O型血的安安，雙親都是A型血",C:"沒有美人尖的洋洋，父母都有美人尖",D:"皮膚白皙的小沈，雙親膚色都相當深",E:"小萬血型跟媽媽一樣是O型，爸爸卻是AB型"},a:["A","E"],ex:"雙親單眼皮(隱性)不可能生雙眼皮(顯性)；AB型爸爸子代必帶Iᴬ或Iᴮ不可能為O型。其餘皆有機會（父母帶隱性）。"},
    {no:24,type:"multi",stem:"以下人類遺傳特徵中，哪些屬於體染色體遺傳？",o:{A:"血友病",B:"蠶豆症",C:"膚色",D:"捲髮",E:"紅綠色盲"},a:["C","D"],ex:"血友病、蠶豆症、紅綠色盲屬性聯遺傳；膚色、捲髮屬體染色體遺傳。"},
    {no:25,type:"multi",stem:"以下哪些構造中可以穩定取得核酸成分？",o:{A:"細胞核",B:"葉綠體",C:"粒線體",D:"核糖體",E:"內質網"},a:["A","B","C","D"],ex:"細胞核、葉綠體、粒線體內都有自己的DNA；核糖體因含RNA而得名。內質網則否。"},
    {no:26,type:"multi",stem:"4種等位基因在染色體上的排列如圖（A-D、B-B、C-c…），不考慮突變與互換、皆完全顯性，下列哪些正確？",o:{A:"形成配子時可產生4種不同配子",B:"進行試交會產生4種子代表現型",C:"形成配子時可產生8種不同配子",D:"進行試交會產生8種子代表現型",E:"進行自交會產生16種子代表現型"},a:["A","B"],ex:"同一條染色體上的等位基因會一起移動→配子4種（ADBC/ADBc/adBC/adBc）；試交子代表現型4種；自交子代基因型最多16種但表現型會重複，故非16。"},
    {no:27,type:"multi",stem:"阿沁(色覺正常、單眼皮、有美人尖)與阿荳(色覺正常、雙眼皮、無美人尖，爸與外公色盲)，三性狀位於不同染色體。下列推論哪些正確？",o:{A:"兩人的女兒絕對不會是色盲",B:"若生下兒子，其色盲機率為1/4",C:"想要跟阿沁一樣的兒子，第一胎機率1/4",D:"想要跟阿荳一樣的女兒，第一胎機率1/4",E:"兩人生下色盲子代的機率是1/4"},a:["A","E"],ex:"女兒必從阿沁得到正常X→不色盲；生下色盲＝色盲兒子1/4＋色盲女兒0＝1/4。(B)兒子色盲機率1/2；(C)1/16；(D)1/8。"},
    /* 閱讀題 */
    {no:28,type:"multi",sec:"閱讀題〈桃園豬〉",pass:"控制毛色的E基因座：Eᴰ(顯性)→黑色、E⁺→棕黑相間野生色、ee→紅色。只要含一個Eᴰ即使異型合子也表現黑色。",stem:"上述豬毛色遺傳具有以下哪些遺傳形式的特徵？",o:{A:"完全顯性遺傳",B:"不完全顯性遺傳",C:"複等位基因遺傳",D:"共顯性遺傳",E:"多基因遺傳"},a:["A","C"],ex:"Eᴰ掩蓋隱性→完全顯性；Eᴰ、E⁺、e 三種等位基因（超過兩種）→複等位基因。"},
    {no:29,type:"multi",stem:"根據文章對毛色的敘述，以下哪些推論正確？",o:{A:"E⁺異型合子皆為棕黑相間",B:"Eᴰ的同型合子為黑色",C:"e遇到E⁺與Eᴰ時都不表現",D:"當E⁺遇到Eᴰ時，E⁺特徵會優先表現",E:"E⁺的同型合子為棕色"},a:["B","C"],ex:"Eᴰ為顯性黑色，同型或異型皆黑；e為隱性遇顯性被掩蓋。(A)E⁺遇Eᴰ會是黑色；(D)Eᴰ優先；(E)E⁺是棕黑相間非純棕。"},
    {no:30,type:"single",stem:"豬的『肌肉脂肪』厚度的遺傳形式為下列何者？（單選）",o:{A:"完全顯性遺傳",B:"不完全顯性遺傳",C:"複等位基因遺傳",D:"共顯性遺傳",E:"多基因遺傳"},a:["E"],ex:"雜交子代肌脂含量呈連續變異、受多對基因累加影響，是典型多基因遺傳。"},
    {no:31,type:"single",stem:"豬的『背脂』厚度的遺傳形式為下列何者？（單選）",o:{A:"完全顯性遺傳",B:"不完全顯性遺傳",C:"複等位基因遺傳",D:"共顯性遺傳",E:"多基因遺傳"},a:["B"],ex:"只有厚、中、薄三種特徵，中間型對應異型合子，屬不完全顯性（中間型遺傳），與多基因的連續分布不同。"},
    /* 混合 */
    {no:32,type:"fill",sec:"混合題（非選）",stem:"（顯微測量）目鏡測微器100X下每格10微米，量得4小格＝載物台測微器5小格。求載物台測微器每小格大小。",atext:"4格×10微米＝40微米；40微米÷5格＝8微米 → 每小格 8 微米",ex:""},
    {no:33,type:"fill",stem:"正常紅血球在100X的樣態，哪一個是200X底下的小血球個體？",atext:"（B）",ex:""},
    {no:34,type:"fill",stem:"小俞×小文（地中海型貧血，簡化為單基因）：推算子代出現輕症與重症的機率。",atext:"輕症機率 1/2（50%）；重症機率 1/4（25%）",ex:""},
    {no:35,type:"fill",sec:"混合題〈蝗蟲體色〉",stem:"純品系綠雄蟲與褐雌蟲分別能產生哪些配子？（雌蟲較雄蟲多一條染色體，G代表綠）",atext:"綠雄蟲：G（Xᴳ）、0（無性染色體）｜褐雌蟲：G′（Xᴳ′）",ex:""},
    {no:36,type:"fill",stem:"用棋盤方格表示兩純品系親代產生第一子代的基因型並標示表現型。",atext:"G′×G → GG′（綠褐，雌）；G′×0 → G′（褐，雄）",ex:""},
    {no:37,type:"fill",stem:"雌蟲的體色遺傳模式最可能是哪些？（中間型／多基因／複等位基因／共顯性）",atext:"中間型 & 共顯性",ex:""},
    {no:38,type:"fill",sec:"混合題〈抗維生素D佝僂症〉",stem:"抗維生素D佝僂症屬於何種類型的遺傳疾病？",atext:"X染色體、顯性、性聯遺傳",ex:""},
    {no:39,type:"fill",stem:"若爸爸帶有抗維生素D佝僂症致病等位基因，此等位基因一定會傳給誰？",atext:"女兒",ex:""},

  e3:{ name:"期末考", sub:"中心法則・演化・分類", questions:[
    {no:1,type:"single",stem:"分子生物學中心法則的核心三大過程「不包含」以下哪一項？",o:{A:"轉型",B:"轉錄",C:"轉譯",D:"複製"},a:["A"],ex:"核心為複製、轉錄、轉譯。轉型（細菌吸收外源DNA）不屬於中心法則。"},
    {no:2,type:"single",stem:"各種酵素與功能配對，何者正確？",o:{A:"DNA合成酶用來複製DNA",B:"蛋白酶主要負責合成蛋白質",C:"限制酶可以對DNA切出特定形狀",D:"DNA連接酶可將DNA的兩股結合在一起"},a:["C"],ex:"複製DNA用DNA聚合酶；蛋白酶是分解蛋白質、合成靠核糖體；DNA連接酶是連接兩「段」DNA而非兩「股」。限制酶切出特定形狀正確。"},
    {no:3,type:"single",stem:"為什麼生物體內不同部位的細胞有不一樣的表現？",o:{A:"基因組成都一樣、但表現的基因不一樣",B:"基因組成都不一樣、表現的基因也不同",C:"基因組成、表現的基因與環境都會影響",D:"基因組成一樣、表現的基因相同但受環境影響"},a:["A"],ex:"體細胞來自有絲分裂，基因組成完全相同；在分化與區域環境下只表現部分基因，造成不同表現。"},
    {no:4,type:"single",stem:"下列何者「不是」造成親代與子代遺傳差異的主要原因？",o:{A:"減數分裂",B:"受精作用",C:"DNA複製",D:"突變"},a:["C"],ex:"複製的目的是製造完全相同的DNA序列，正常情況不會產生差異。"},
    {no:5,type:"single",stem:"喜瑪拉雅兔毛色受溫度影響，其機制為何？",o:{A:"高溫產生黑色素生成酶，夏天毛色變黑",B:"黑色素生成酶本來就會生成，但在低溫才活化、製造黑色素",C:"酶在極高溫與低溫皆被抑制而缺乏黑色素",D:"剃毛綁熱水袋後，新長毛色變黑"},a:["B"],ex:"酶在低溫被活化→低溫黑毛、高溫白毛。基因都會表現，差異來自溫度對酵素的影響。"},
    {no:6,type:"single",stem:"關於基因轉殖技術的操作細節，何者正確？",o:{A:"將胰島素轉殖進細菌使其大量製造胰島素",B:"載體與目標DNA的切割應使用相同的限制酶",C:"基因轉殖後的主要產物是DNA",D:"篩選是挑出重組成功的DNA再移入生物體"},a:["B"],ex:"切口互補才能接合，故用相同限制酶。(A)應轉殖「胰島素基因」；(C)產物是蛋白質；(D)篩選是挑出轉殖成功的個體。"},
    {no:7,type:"single",stem:"以下何者「不是」基因轉殖技術成功應用的案例？",o:{A:"利用細菌清除海上漏油",B:"超快速生長的脊椎動物",C:"不需使用殺蟲劑的玉米",D:"複製一樣的動物如桃莉羊"},a:["D"],ex:"桃莉羊是複製技術（細胞核移轉），沒有基因重組。"},
    {no:8,type:"single",stem:"對於基因轉殖技術的認識或態度，何者正確？",o:{A:"可將DNA與蛋白質送入生物體者稱為載體",B:"基因轉殖百利無一害，應大力鼓勵",C:"轉殖技術已非常成熟，成功率接近100%",D:"轉殖的基因可能透過授粉機制進入野生植物"},a:["D"],ex:"載體是送入特定基因(DNA)，與蛋白質無關；工具本身中性有利有弊；成功率仍有限故需篩選。"},
    {no:9,type:"single",stem:"中心法則配對（反應/模板/原料），何者正確？",o:{A:"複製/DNA/DNA",B:"轉錄/DNA/核糖核苷酸",C:"轉錄/DNA/RNA",D:"轉譯/RNA/蛋白質"},a:["B"],ex:"複製原料為dNTP；轉錄原料為NTP（核糖核苷酸）；轉譯原料為胺基酸。故(B)正確。"},
    {no:10,type:"single",stem:"DNA粗萃取用在動物身上，相較植物實驗可省略哪個步驟？",o:{A:"加入清潔劑",B:"加入嫩精",C:"用雙層紗布過濾",D:"果汁機打破細胞壁"},a:["D"],ex:"動物沒有細胞壁，不需用果汁機打破細胞壁。"},
    {no:11,type:"single",stem:"以奇異果為材料的DNA粗萃取，步驟順序應為？甲加食鹽水 乙加嫩精 丙磨碎果肉 丁加清潔劑 戊加冰酒精",o:{A:"丙丁乙甲戊",B:"甲乙丙丁戊",C:"乙丙丁戊甲",D:"丁甲戊乙丙"},a:["A"],ex:"由外而內：先磨碎破壁→清潔劑去膜→食鹽水分離→蛋白酶(嫩精)去蛋白→冰酒精析出DNA。"},
    {no:12,type:"single",stem:"關於DNA粗萃取各步驟的原理，何者正確？",o:{A:"加入清潔劑可輔助溶解細胞壁",B:"高濃度食鹽水利用離子間引力破壞核膜",C:"木瓜酵素可以去除蛋白質",D:"冷凍過的酒精可使蛋白質變性沉澱"},a:["C"],ex:"木瓜酵素是蛋白酶可去蛋白質。清潔劑溶的是膜；冰酒精是讓DNA因溶解度下降而析出。"},
    {no:13,type:"single",stem:"混合論對達爾文天擇理論造成什麼致命困境？",o:{A:"後天性狀直接混入子代，證明環境能主動創造有利變異",B:"有利變異在後代被放大，使天擇過快",C:"父母性狀混合產生全新物種，無法解釋種內變異來源",D:"性狀不斷混合會使個體差異逐漸被稀釋，讓天擇缺乏可累積的遺傳變異"},a:["D"],ex:"(A)是拉馬克後天獲得性遺傳；(B)混合論下變異被稀釋而非放大；(C)混合論使後代趨平均，困境是變異無法「維持」。"},
    {no:14,type:"single",stem:"孟德爾遺傳學如何重新鞏固「變異」與「天擇」的關聯？",o:{A:"變異能以獨立單位在世代間保存與重新組合，使天擇有可持續作用的材料",B:"變異主要來自環境刺激，個體會產生符合需求的性狀再被保留",C:"天擇會直接改變個體基因，使生物一生逐漸產生更適合的特徵",D:"性狀在後代平均融合，使極端變異消失"},a:["A"],ex:"孟德爾指出變異來自基因組合與突變、隨機發生；(B)是拉馬克變形；(C)天擇篩選既有差異；(D)是舊混合論。"},
    {no:15,type:"single",stem:"甲綠蠵龜與綠鬣蜥前肢；乙人手與海豚胸鰭；丙蜂鳥與泥壺蜂飛翅；丁獼猴與赤蛙血紅素；戊葉鼻蝠翅與哈士奇前腳。何者互為「趨異演化」依據？",o:{A:"甲丙丁",B:"甲乙戊",C:"乙丙戊",D:"乙丙丁",E:"丙丁戊"},a:["B"],ex:"趨異演化＝同源構造（外異內同）。四足類前肢甲乙戊皆是；丙為趨同演化；丁屬生化證據。"},
    {no:16,type:"single",stem:"有關生物之間演化關係與證據，何者正確？",o:{A:"鯨魚前肢與人手因功能不同，不屬同源構造",B:"人與家兔盲腸闌尾產纖維素酶能力不同，故不可作演化證據",C:"鱷魚鱗片與鳥類羽毛皆來自體表角質化衍生物，可作演化證據",D:"鯨鯊與海豚身型皆流線，可判斷來自共同祖先",E:"加拉巴哥雀鳥喙形不同但外型相似，仍為同一物種"},a:["C"],ex:"(A)鯨魚與人前肢是同源構造；(B)盲腸是同源構造可作證據；(D)流線為同功構造；(E)已分化為不同物種。"},
    {no:17,type:"single",stem:"有關林奈的自然系統與達爾文演化樹，何者正確？",o:{A:"林奈是最早有演化概念者，被尊稱演化學之父",B:"林奈認為生物具有共同祖先",C:"林奈的分類系統已有界門綱目科屬種7階層",D:"達爾文演化樹的每個分叉點代表演化分歧",E:"具共同祖先的不同物種成體必可找到所有基本構造"},a:["D"],ex:"林奈是神創論支持者、非演化學之父；林奈僅界綱目屬種5階層；胚胎學看的是胚胎階段而非成體。"},
    {no:18,type:"single",stem:"親緣關係實例與證據類別配對（甲海鞘幼蟲有尾索…己始祖鳥兼具爬蟲與鳥特徵…），有幾項正確？",o:{A:"3",B:"4",C:"5",D:"6",E:"7"},a:["B"],ex:"錯誤三項：甲（幼體不屬胚胎學）、丙（奇異鳥現存尚未成化石）、己（始祖鳥應屬化石證據）。7項中4項正確。"},
    {no:19,type:"single",stem:"病毒合成蛋白質時對酵素的需求，何者最正確？",o:{A:"不需酵素",B:"利用本身的酵素",C:"利用宿主的酵素",D:"利用宿主及本身的酵素",E:"利用進入病毒內的宿主酵素在病毒內合成"},a:["C"],ex:"病毒沒有完整酵素系統，須利用宿主的酵素完成基因表現。"},
    {no:20,type:"single",stem:"下列關於「噬菌體」的敘述，何者『錯誤』？",o:{A:"能吞噬細菌",B:"不具有酵素系統",C:"大多為DNA病毒",D:"通常像蝌蚪有大頭與細長身體",E:"僅由核酸和蛋白質組成"},a:["A"],ex:"噬菌體遠小於細菌，不可能「吞噬」細菌，(A)敘述錯誤。"},
    /* 多選 */
    {no:21,type:"multi",sec:"多選題",stem:"關於中心法則的描述，哪些正確？",o:{A:"所有生物的轉錄都在細胞核中發生",B:"DNA複製時，兩股合成的方向剛好相反",C:"RNA轉錄時只針對DNA其中一股進行",D:"基因的表現主要由RNA執行功能",E:"基因表現時每次都要複製、轉錄與轉譯"},a:["B","C"],ex:"(A)原核生物轉錄在細胞質；(D)執行功能主要是蛋白質；(E)基因表現只含轉錄與轉譯，複製是分裂前才做。"},
    {no:22,type:"multi",stem:"同卵雙胞胎來自同一受精卵，哪些條件可能造成其表徵不同？",o:{A:"環境條件的影響",B:"具有不一樣的等位基因",C:"具有不同的基因型",D:"基因發生突變",E:"一條DNA上有許多不同的基因"},a:["A","D"],ex:"同卵雙胞胎基因組成應一致，差異來自突變或環境；(B)(C)(E)不成立。"},
    {no:23,type:"multi",stem:"以下哪些物質是基因轉殖技術中常被使用的載體？",o:{A:"細菌染色體",B:"細菌核糖體",C:"細菌質體",D:"細菌內質網",E:"病毒核酸"},a:["C","E"],ex:"細菌質體與病毒核酸是常見的基因轉殖載體。"},
    {no:24,type:"multi",stem:"關於DNA粗萃取的描述，哪些正確？",o:{A:"嫩精是酵素，可溶解細胞讓染色體釋出",B:"即使各種純化，最終仍無法得到純DNA分子",C:"最終棉絮狀物質，每條絲便是一條DNA分子",D:"強大剪力可破壞細胞膜，故超高速果汁機可取代清潔劑",E:"DNA在冰酒精中析出，是因溶解度下降而聚集纏繞"},a:["B","E"],ex:"(A)嫩精是蛋白酶、分解蛋白質；(C)棉絮是大量DNA纏繞，單一DNA無法肉眼辨識；(D)去膜應用清潔劑，剪力過強會破壞DNA。"},
    {no:25,type:"multi",stem:"鐮形血球（S′S′重症、SS正常、SS′輕微）在瘧疾流行區 S′比例明顯偏高，可能原因為何？",o:{A:"地理隔離導致S′比例提高",B:"瘧原蟲入侵後誘發正常人S基因突變為S′",C:"屬天擇結果，瘧疾扮演環境篩選角色",D:"瘧原蟲較易寄生正常紅血球，使SS個體因瘧疾增加死亡淘汰",E:"SS′帶因者紅血球攜氧能力低，以致不易被瘧原蟲感染"},a:["C","D"],ex:"文中未提地理隔離；一般環境不會刺激突變；(E)並非攜氧差異，而是帶因者對瘧疾抵抗較佳。屬天擇下的環境篩選。"},
    {no:26,type:"multi",stem:"長頸鹿天擇模式圖（甲乙丙丁，虛線=天擇前、實線=天擇後），下列哪些正確？",o:{A:"圖甲表示天擇對身高沒有作用",B:"圖乙實線波峰右移，說明天擇對身高越高者有較高相對適應度",C:"圖丙平均值附近個體天擇後頻率大幅下降，顯示平均身高者反而較不具生存優勢",D:"圖丁顯示天擇後各身高頻率變得更平均",E:"圖甲最容易導致族群身高差異越來越大"},a:["B","C"],ex:"(A)甲淘汰兩極端，仍有作用；(D)極端值被淘汰應如甲，丁是對中間值加壓；(E)丙（作用在中間值）才會使差異變大。"},
    {no:27,type:"multi",stem:"綠灌叢白砂島上、身體多色素的昆蟲，經長時間較可能觀察到？",o:{A:"為躲鳥類，昆蟲自主改變食性潛伏白砂食沙礫",B:"綠色突變個體因保護色存活率高，綠色基因個體比例增加",C:"長期啃食造成灌叢生存壓力，葉片含毒或堅硬的灌叢比例上升",D:"鳥類站在與自身體色相異的背景上有利捕食昆蟲",E:"透過用進廢退，鳥類視覺變得更敏銳"},a:["B","C"],ex:"(A)(E)是用進廢退說，應以天擇論述；(D)站相近背景色才較利捕獵。"},
    {no:28,type:"multi",stem:"8種現代貓科動物演化樹（分節點1~6），下列哪些正確？",o:{A:"題圖顯示有9個共同祖先",B:"此8種動物皆來自於1個共同祖先",C:"細腰貓與美洲豹距今最近的共同祖先位於支點2",D:"老虎與雪豹的親緣關係較老虎與美洲豹近",E:"無法確認美洲豹與花豹的親緣關係較美洲豹與獅子遠"},a:["B","C","E"],ex:"共祖為1~6分支點前的枝條（6個）；老虎與美洲豹最近共祖在支點4、雪豹與老虎在支點3，故老虎與美洲豹較接近。"},
    {no:29,type:"multi",stem:"下列有關親緣關係重建的敘述，哪些正確？",o:{A:"指標化石作為定年工具，其生存地史時間愈長則愈精準",B:"解剖構造比外觀及功能特性更容易保留祖先特徵",C:"人和雞只有胚胎期才出現的咽囊，可說明兩者間的同源現象",D:"碳水化合物與脂質常用於推斷物種間的親緣關係",E:"不同地史時代的水陸分布，可用於推測物種的演化過程"},a:["B","C","E"],ex:"(A)指標化石生存時間愈短、定年愈精準；(D)分子證據應採DNA、RNA或蛋白質胺基酸序列。"},
    {no:30,type:"multi",stem:"四方形為目、圓形為科、三角形為屬，關於甲～己分類階層，哪些正確？",o:{A:"附圖中包含一目兩科三屬",B:"丙、己兩階層中的生物同目不同科",C:"丁階層中的生物是甲科乙屬",D:"臺灣獼猴若歸類在己階層，則臺灣山椒魚必定不在甲階層範圍內",E:"若丙階層某生物學名為 Saprolegnia diclina，則丁階層生物學名至少有一個拉丁字與其相同"},a:["A","B","D"],ex:"（依公布答案）A、B、D正確；同屬才有相同的拉丁屬名，故僅同一圈內才會相同。"},
    {no:31,type:"multi",stem:"根據出土化石建立的恐龍及鳥類支序圖，下列哪些正確？",o:{A:"暴龍是具絨羽恐龍及鳥類的共同祖先",B:"支序圖反映化石出土順序：中華龍鳥→伶盜龍→尾羽鳥→始祖鳥",C:"現生鳥類和恐龍（鳥類以外的所有類群）具有共同祖先",D:"飛羽是始祖鳥和現生鳥類的同源構造",E:"支序圖可作為鳥類和爬蟲類應分成兩個不同類群的依據"},a:["C","D"],ex:"(A)應為「暴龍與有絨羽爬蟲類具共同祖先」；(B)出土順序與存在年代無直接關係；(E)支序圖反而支持鳥類隸屬爬蟲類分支。"},
    {no:32,type:"multi",stem:"有關達爾文演化理論的孕育過程，下列哪些正確？",o:{A:"1831~1836小獵犬號環球考察後，回英國隨即發表《物種起源》",B:"馬爾薩斯的人口論是啟發達爾文『生存競爭』的重要著作",C:"天擇說參考林奈的分類架構，均認為生物有共同祖先",D:"達爾文從孟德爾遺傳法則得知繁殖會產生遺傳變異",E:"人們對家禽家畜農作物的育種（人擇）也啟發了達爾文的天擇想法"},a:["B","E"],ex:"(A)考察後多年、受華萊士來信刺激才共同發表；(C)林奈認為生物由上帝創造、無共同祖先；(D)達爾文未接受孟德爾遺傳法則，後人才連結。"},
    {no:33,type:"multi",stem:"胡椒蛾翅色由T/t決定（TT、Tt褐色；tt黃色），十年調查如圖。下列判斷哪些正確？",o:{A:"等位基因T與t中，t為顯性",B:"基因型TT在族群中的比例逐年升高",C:"等位基因T與t並存於族群中",D:"褐色蛾在族群中的比例逐年降低",E:"此蛾族群大小因黃色蛾比率增加而變大"},a:["C","D"],ex:"大寫T才是顯性；黃色增加代表tt增加；圖僅呈相對比例，無法推測總族群大小。"},
    {no:34,type:"multi",stem:"（B型肝炎短文）下列敘述哪些正確？",o:{A:"上述三種病毒都具有遺傳物質DNA",B:"上述三種病毒都需用電子顯微鏡才可觀察到",C:"基因重組B肝疫苗是以B肝病毒為載體",D:"基因重組B肝疫苗的成分是蛋白質",E:"偵測到對應B肝表面抗原的抗體，就代表曾被B肝病毒感染"},a:["B","D"],ex:"COVID是RNA疫苗（非皆DNA）；B肝病毒是人類病毒無法感染酵母菌（載體應另選）；疫苗也能誘發抗體，故有抗體不代表曾感染。"},
    /* 題組一 密碼子 */
    {no:35,type:"single",sec:"題組一〈密碼子〉",pass:"RNA密碼子由內而外讀取；AUU→Ile(I)，UAA=終止密碼，AUG=起始密碼。給定RNA：AUGUAUUUUGCUAUUUUAA。",stem:"有關密碼子對照表的描述，何者正確？",o:{A:"每一種胺基酸至少都有一種密碼子與其對應",B:"每一種編碼都能對應到其中一種胺基酸",C:"密碼子總共有20種，可對應到20種不同的胺基酸",D:"表中的AUCG是代表RNA上的胺基酸序列"},a:["A"],ex:"(B)終止密碼子UAA/UAG/UGA無對應胺基酸；(C)密碼子共64種；(D)AUCG是RNA鹼基非胺基酸。"},
    {no:36,type:"single",stem:"轉錄出此RNA序列（AUGUAUUUUGCUAUUUUAA）的模板股DNA序列為？",o:{A:"AUGUAUUUUGCUAUUUUAA",B:"ATGTATTTTGCTATTTTAA",C:"TACATAAAACGATAAAATT",D:"UACAUAAAACGAUAAAAUU"},a:["C"],ex:"模板股與RNA互補：A↔T、U↔A、G↔C、C↔G，故為 TACATAAAACGATAAAATT。"},
    {no:37,type:"single",stem:"此段RNA進行轉譯時，製作出的序列「最多」有幾個胺基酸？",o:{A:"5個",B:"6個",C:"7個",D:"10個"},a:["B"],ex:"共20個鹼基，三個一讀→6個胺基酸，並多出2個無法讀取的鹼基。"},
    {no:38,type:"single",stem:"承上題，此段RNA對應到的胺基酸序列縮寫為？",o:{A:"MYFAIL",B:"YFAIL",C:"MYFAI",D:"FAIL"},a:["A"],ex:"AUG→M、UAU→Y、UUU→F、GCU→A、AUU→I、UUA→L，即 MYFAIL。"},
    {no:39,type:"multi",stem:"上述基因表現過程中，會需要哪些蛋白質的參與？",o:{A:"DNA聚合酶",B:"核糖體",C:"RNA合成酶",D:"RNA聚合酶",E:"蛋白酶"},a:["B","D"],ex:"基因表現＝轉錄（需RNA聚合酶）＋轉譯（需核糖體）。DNA聚合酶用於複製；正確名稱為RNA聚合酶。"},
    /* 題組二 密度離心 */
    {no:40,type:"single",sec:"題組二〈DNA密度離心〉",pass:"試管三層分別代表 ¹⁴N¹⁴N、¹⁴N¹⁵N、¹⁵N¹⁵N，厚度反映相對含量。",stem:"深色=既存DNA、淺色=新合成DNA，何者為正確的DNA複製示意圖？",o:{A:"（A）",B:"（B）",C:"（C）"},a:["C"],ex:"半保留複製：結果應為雙股中一股深色、一股淺色，如圖(C)。"},
    {no:41,type:"single",stem:"¹⁴N養菌移到¹⁵N培養，取原始、第一代、第二代離心分層，分別與哪幾根試管一致？",o:{A:"145",B:"247",C:"456",D:"478"},a:["B"],ex:"原始¹⁴N在上層(2)；第一代皆為¹⁴N¹⁵N中層(4)；第二代¹⁴N¹⁵N與¹⁵N¹⁵N居中層與下層(7)。"},
    {no:42,type:"single",stem:"¹⁵N養菌移到¹⁴N培養，第5代 ¹⁴N¹⁴N ： ¹⁴N¹⁵N ： ¹⁵N¹⁵N 比例為何？",o:{A:"15:1:0",B:"0:1:15",C:"7:1:0",D:"0:1:7"},a:["A"],ex:"半保留複製第5代：輕15/16、中1/16、重0，即 15:1:0。"},
    /* 題組三 拉馬克vs達爾文 */
    {no:43,type:"single",sec:"題組三〈拉馬克 vs 達爾文〉",pass:"拉馬克主張『用進廢退』、物種只變化不滅絕；達爾文天擇由變異、遺傳、選擇、適應構成。1943 Luria-Delbrück實驗證實突變隨機自發。",stem:"兩者在「變異與環境」關係上的核心矛盾為何？",o:{A:"達爾文強調往高等前進的衝動；拉馬克強調變異遺傳與選擇",B:"達爾文認為演化不會導致滅絕；拉馬克認為不適應者必滅絕",C:"達爾文認為環境會主動誘發變異；拉馬克認為變異隨機產生",D:"達爾文認為變異先於環境選擇而存在；拉馬克認為變異是為了適應環境才產生"},a:["D"],ex:"(A)完全顛倒兩人理論；(B)滅絕觀點相反（達爾文承認滅絕）；(C)內容對調。"},
    {no:44,type:"single",stem:"1943年Luria-Delbrück細菌實驗，為下列哪一演化觀點提供強力證據？",o:{A:"環境改變會直接決定突變的最終方向",B:"個體變異在環境選擇之前，就已隨機且自發地存在於族群中",C:"生物為適應環境壓力，會主動設計對應的突變方向",D:"後天獲得的性狀可透過基因甲基化遺傳給下一代"},a:["B"],ex:"環境可能刺激突變但無法決定方向；基因甲基化是後來研究的結論，非此實驗。"},
  ]}

/* ============ 狀態 ============ */
let current="e1";
let filmMode=true; // true=蓋著（隱藏答案）
let filter="all";
const state={}; // state[examKey][no] = {sel:[],revealed,graded,mark}
for(const k in EXAMS){ state[k]={};
  EXAMS[k].questions.forEach(q=>{ state[k][q.no]={sel:[],revealed:false,graded:false,mark:null}; });
}

const eq=(a,b)=>a.length===b.length&&a.every(x=>b.includes(x));

/* ---- 紅藍筆：紅=題目在問什麼／陷阱字，藍=關鍵字 ---- */
const RED=["下列何者正確","下列何者錯誤","何者最正確","何者正確","何者錯誤","下列何者","何者","哪些正確","哪一項","哪一種","哪一個","哪幾根","哪幾","哪些","不是","不正確","不包含","不需要","不屬於","最正確","最合理","最佳","最適合","最接近","最可能","最符合","錯誤","正確","一定","必定","絕對","皆","僅有","僅","只有","只","幾分之幾","幾種","幾個","依序","分別","不含","除了"];
const BLUE=["中心法則","轉型","轉錄","轉譯","複製","限制酶","DNA連接酶","DNA聚合酶","DNA合成酶","蛋白酶","核糖體","載體","質體","密碼子","起始密碼","終止密碼","模板股","去氧核糖核苷酸","核糖核苷酸","含氮鹼基","胺基酸","嘌呤","嘧啶","核苷酸","五碳醣","減數分裂","有絲分裂","同源染色體","姊妹染色分體","二分體","四分體","分離律","獨立分配律","染色體學說","等位基因","基因型","表現型","性狀","表徵","不完全顯性","共顯性","複等位基因","多基因遺傳","性聯遺傳","體染色體","顯性","隱性","中間型","累加性","試交","配子","天擇","突變","變異","趨異演化","趨同演化","同源構造","同功構造","共同祖先","內共生","化石證據","化石","胚胎學","比較解剖學","生物地理學","分子生物學","拉馬克","達爾文","孟德爾","林奈","用進廢退","混合論","光合作用","光反應","固碳反應","類囊體","葉綠體","粒線體","磷脂雙層膜","糖解作用","有氧呼吸","乳酸發酵","酒精發酵","基因轉殖","基因表現","載物台測微器","目鏡測微器","細胞壁","清潔劑","嫩精","木瓜酵素","冰酒精","高濃度食鹽水","噬菌體","大腸桿菌","藍綠菌","酵母菌","乳酸菌","病毒","喜瑪拉雅兔","鐮形血球","瘧疾","桃園豬","胡椒蛾","地中海性貧血","佝僂症","色盲","美人尖","雙眼皮","單眼皮"];
const MARKS=[...RED.map(w=>[w,'ur']),...BLUE.map(w=>[w,'ub'])].sort((a,b)=>b[0].length-a[0].length);
function mark(t){
  if(!t) return t;
  const store=[];
  for(const [w,cls] of MARKS){
    if(t.indexOf(w)<0) continue;
    t=t.split(w).join('\u0001'+store.length+'\u0001');
    store.push('<u class="'+cls+'">'+w+'</u>');
  }
  return t.replace(/\u0001(\d+)\u0001/g,(m,i)=>store[i]);
}

/* ============ 建立分頁 ============ */
const tabsEl=document.getElementById('tabs');
Object.keys(EXAMS).forEach(k=>{
  const b=document.createElement('button');
  b.className='tab'+(k===current?' on':'');
  b.innerHTML=`${EXAMS[k].name}<small>${EXAMS[k].sub}</small>`;
  b.onclick=()=>{ current=k; filter='all'; syncFilterBtns(); render(); document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',Object.keys(EXAMS)[i]===k)); window.scrollTo({top:0,behavior:'smooth'}); };
  tabsEl.appendChild(b);
});

/* film toggle */
const filmToggle=document.getElementById('filmToggle');
const filmLabel=document.getElementById('filmLabel');
function setFilm(v){
  filmMode=v;
  filmToggle.classList.toggle('off',!filmMode);
  filmLabel.textContent=filmMode?'紅膠片：蓋著':'紅膠片：掀開';
  // apply to all currently rendered answers (without changing graded state)
  EXAMS[current].questions.forEach(q=>{
    if(!filmMode) state[current][q.no].revealed=true;
    else if(!state[current][q.no].graded) state[current][q.no].revealed=false;
  });
  render();
}
filmToggle.onclick=()=>setFilm(!filmMode);

/* filters */
function syncFilterBtns(){
  document.querySelectorAll('.filters .mini').forEach(b=>{
    if(b.dataset.f==='reset') return;
    b.classList.toggle('on',b.dataset.f===filter);
  });
}
document.querySelectorAll('.filters .mini').forEach(b=>{
  b.onclick=()=>{
    if(b.dataset.f==='reset'){
      EXAMS[current].questions.forEach(q=>state[current][q.no]={sel:[],revealed:false,graded:false,mark:null});
      filter='all'; syncFilterBtns(); if(!filmMode) setFilm(true); else render(); return;
    }
    filter=b.dataset.f; syncFilterBtns(); render();
  };
});

/* ============ 渲染 ============ */
const main=document.getElementById('main');
function passVisible(q){
  const st=state[current][q.no];
  if(filter==='todo') return !st.graded && st.mark===null;
  if(filter==='wrong') return st.mark==='miss' || (st.graded && st.result==='wrong');
  return true;
}

function render(){
  main.innerHTML='';
  const qs=EXAMS[current].questions;
  let lastSec=null, shown=0;
  qs.forEach(q=>{
    if(!passVisible(q)) return;
    shown++;
    if(q.sec && q.sec!==lastSec){
      const h=document.createElement('div'); h.className='sec'; h.textContent=q.sec; main.appendChild(h); lastSec=q.sec;
    } else if(q.sec){ lastSec=q.sec; }
    if(q.pass){
      const p=document.createElement('div'); p.className='passage'; p.innerHTML='📖 '+q.pass; main.appendChild(p);
    }
    main.appendChild(card(q));
  });
  if(shown===0){
    const e=document.createElement('div'); e.className='empty';
    e.textContent = filter==='wrong' ? '目前沒有答錯的題目 🎉' : (filter==='todo'?'這份都作答完了 👏':'沒有題目');
    main.appendChild(e);
  }
  updateScore();
  syncFilterBtns();
}

function card(q){
  const st=state[current][q.no];
  const el=document.createElement('div'); el.className='q';
  const isMulti=q.type==='multi', isFill=q.type==='fill';
  const tag = isFill?'非選':(isMulti?'多選':'單選');
  el.innerHTML=`<div class="stem"><span class="no">${q.no}</span>${mark(q.stem)}<span class="tag ${isMulti?'multi':''}">${tag}</span></div>`;

  // options
  if(!isFill){
    const wrap=document.createElement('div'); wrap.className='opts';
    if(st.graded) wrap.classList.add('graded');
    Object.entries(q.o).forEach(([k,txt])=>{
      const o=document.createElement('button'); o.className='opt';
      o.innerHTML=`<span class="k">${k}</span><span>${mark(txt)}</span>`;
      if(st.graded){
        if(q.a.includes(k)) o.classList.add('correct');
        else if(st.sel.includes(k)) o.classList.add('badpick');
      } else if(st.sel.includes(k)) o.classList.add('pick');
      o.onclick=()=>{
        if(st.graded) return;
        if(isMulti){ st.sel.includes(k)?st.sel=st.sel.filter(x=>x!==k):st.sel.push(k); }
        else { st.sel=[k]; }
        render();
      };
      wrap.appendChild(o);
    });
    el.appendChild(wrap);
  }

  // reveal button
  if(!st.revealed){
    const btns=document.createElement('div'); btns.className='qbtns';
    const r=document.createElement('button');
    if(isFill){ r.className='reveal'; r.textContent='🔴 掀開答案'; }
    else if(st.sel.length){ r.className='reveal'; r.textContent='對答案'; }
    else { r.className='reveal small'; r.textContent='🔴 直接看答案'; }
    r.onclick=()=>{
      st.revealed=true;
      if(!isFill && st.sel.length){ st.graded=true; st.result=eq(st.sel,q.a)?'correct':'wrong'; st.mark=st.result==='correct'?'got':'miss'; }
      render();
    };
    btns.appendChild(r);
    el.appendChild(btns);
  } else {
    // answer under film
    const ans=document.createElement('div'); ans.className='ans'+((st.graded||!filmMode||st._open)?' open':'');
    const keyTxt = isFill ? (q.atext||'') : q.a.join('、');
    const lab = isFill?'參考答案':(st.graded?(st.result==='correct'?'答對':'答錯　正解'):'答案');
    ans.innerHTML=`
      <div class="film">🔴 紅膠片 · 點一下翻開 <small>（藍筆想完再看）</small></div>
      <div class="ans-body">
        <div class="ans-key"><span class="lab">${lab}</span>${keyTxt}</div>
        ${q.ex?`<div class="explain">${q.ex}</div>`:''}
      </div>`;
    ans.querySelector('.film').onclick=()=>{ st._open=true; render(); };
    el.appendChild(ans);

    // self mark (for fill or ungraded reveals)
    if(isFill || !st.graded){
      const sm=document.createElement('div'); sm.className='selfmark';
      const g=document.createElement('button'); g.className='got'+(st.mark==='got'?' on':''); g.textContent='我會了 ✓';
      const m=document.createElement('button'); m.className='miss'+(st.mark==='miss'?' on':''); m.textContent='再複習 ✗';
      g.onclick=()=>{ st.mark = st.mark==='got'?null:'got'; render(); };
      m.onclick=()=>{ st.mark = st.mark==='miss'?null:'miss'; render(); };
      sm.appendChild(g); sm.appendChild(m); el.appendChild(sm);
    }
  }
  return el;
}

function updateScore(){
  const qs=EXAMS[current].questions;
  let done=0, got=0, miss=0;
  qs.forEach(q=>{ const st=state[current][q.no];
    if(st.mark==='got'){done++;got++;}
    else if(st.mark==='miss'){done++;miss++;}
    else if(st.graded){done++; st.result==='correct'?got++:miss++;}
  });
  document.getElementById('score').innerHTML = `作答 ${done}/${qs.length}　答對 <b>${got}</b>　待複習 <span class="w">${miss}</span>`;
  document.getElementById('prog').style.width = (done/qs.length*100)+'%';
}

render();
</script>
</body>
</html>
