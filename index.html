<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生物複習・白話詳解</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root{
    --paper:#fbf6ec;
    --paper-2:#f4ead6;
    --ink:#3a3027;
    --ink-soft:#6f6354;
    --line:#e3d6bd;
    --yes:#2f8f5b;
    --no:#cf5b4e;
    --accent:#e8915f;
    --accent-deep:#c96a3a;
    --shadow:rgba(120,90,50,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Noto Sans TC',system-ui,sans-serif;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(232,145,95,.05), transparent 38%),
      radial-gradient(circle at 88% 72%, rgba(47,143,91,.05), transparent 40%);
    color:var(--ink);
    line-height:1.75;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Header ===== */
  header{
    position:relative;
    padding:46px 20px 30px;
    text-align:center;
    overflow:hidden;
  }
  .eyebrow{
    font-family:'Gaegu',cursive;
    font-size:1.15rem;
    color:var(--accent-deep);
    letter-spacing:.18em;
    margin-bottom:6px;
  }
  header h1{
    font-size:clamp(1.9rem,6vw,3rem);
    font-weight:900;
    letter-spacing:.02em;
    line-height:1.15;
  }
  header h1 .squig{
    display:inline-block;
    color:var(--accent-deep);
    position:relative;
  }
  .subtitle{
    margin-top:12px;
    color:var(--ink-soft);
    font-size:1rem;
  }
  .counter{
    display:inline-flex;gap:18px;margin-top:18px;flex-wrap:wrap;justify-content:center;
  }
  .counter span{
    font-family:'Gaegu',cursive;
    font-size:1.05rem;
    background:#fff;
    border:2px solid var(--line);
    border-radius:30px;
    padding:4px 16px;
    box-shadow:0 3px 0 var(--shadow);
  }
  .counter b{color:var(--accent-deep);font-size:1.25rem;}

  /* ===== Tips banner ===== */
  .tips{
    max-width:880px;margin:8px auto 0;padding:0 20px;
  }
  .tips-card{
    background:linear-gradient(180deg,#fff,#fffdf8);
    border:2px dashed var(--accent);
    border-radius:18px;
    padding:18px 20px;
    box-shadow:0 4px 0 var(--shadow);
  }
  .tips-card h3{
    font-family:'Gaegu',cursive;font-size:1.4rem;color:var(--accent-deep);
    margin-bottom:8px;display:flex;align-items:center;gap:8px;
  }
  .tips-card ul{list-style:none;display:grid;gap:7px;}
  .tips-card li{
    padding-left:26px;position:relative;font-size:.96rem;color:var(--ink);
  }
  .tips-card li::before{
    content:'★';position:absolute;left:0;top:0;color:var(--accent);font-size:.9rem;
  }

  /* ===== Controls ===== */
  .controls{
    position:sticky;top:0;z-index:50;
    background:rgba(251,246,236,.92);
    backdrop-filter:blur(8px);
    border-bottom:2px solid var(--line);
    padding:14px 20px;
    margin-top:26px;
  }
  .controls-inner{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}
  .search-row{display:flex;gap:10px;align-items:center;}
  .search-box{
    flex:1;display:flex;align-items:center;gap:8px;
    background:#fff;border:2px solid var(--line);border-radius:30px;
    padding:8px 16px;box-shadow:inset 0 1px 3px rgba(0,0,0,.04);
  }
  .search-box:focus-within{border-color:var(--accent);}
  .search-box input{
    flex:1;border:none;outline:none;background:transparent;
    font-family:'Noto Sans TC';font-size:1rem;color:var(--ink);
  }
  .search-box svg{flex-shrink:0;opacity:.5;}
  .clear-btn{
    border:none;background:var(--paper-2);color:var(--ink-soft);
    border-radius:20px;padding:4px 12px;cursor:pointer;font-size:.85rem;font-family:inherit;
  }
  .clear-btn:hover{background:var(--line);}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .chips::-webkit-scrollbar{height:5px;}
  .chips::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;}
  .chip{
    flex-shrink:0;border:2px solid var(--line);background:#fff;
    border-radius:30px;padding:6px 15px;cursor:pointer;
    font-family:'Noto Sans TC';font-size:.88rem;font-weight:500;color:var(--ink-soft);
    transition:all .15s;white-space:nowrap;
  }
  .chip:hover{border-color:var(--accent);color:var(--accent-deep);}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 0 var(--shadow);}

  /* ===== Main ===== */
  main{max-width:1000px;margin:0 auto;padding:28px 20px 80px;}
  .unit{margin-bottom:42px;scroll-margin-top:160px;}
  .unit-head{
    display:flex;align-items:baseline;gap:12px;margin-bottom:18px;
    padding-bottom:10px;border-bottom:3px solid var(--ink);
  }
  .unit-head .dot{
    width:14px;height:14px;border-radius:50%;flex-shrink:0;align-self:center;
  }
  .unit-head h2{font-size:1.45rem;font-weight:900;letter-spacing:.01em;}
  .unit-head .qn{
    font-family:'Gaegu',cursive;font-size:1rem;color:var(--ink-soft);margin-left:auto;flex-shrink:0;
  }
  .intro{
    background:var(--paper-2);border-radius:14px;padding:12px 16px;margin-bottom:18px;
    font-size:.92rem;color:var(--ink-soft);border-left:5px solid var(--accent);
  }

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

  /* ===== Card ===== */
  .card{
    background:#fff;border:2px solid var(--line);border-radius:18px;
    overflow:hidden;box-shadow:0 4px 0 var(--shadow);
    transition:transform .12s, box-shadow .12s;
    display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--shadow);}
  .card-top{
    padding:14px 16px 12px;cursor:pointer;position:relative;
  }
  .card-top:hover{background:#fffdf7;}
  .qmeta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .qbadge{
    font-family:'Gaegu',cursive;font-weight:700;font-size:.95rem;
    background:var(--ink);color:#fff;border-radius:8px;padding:1px 9px;
  }
  .qtoggle{
    margin-left:auto;font-size:.78rem;color:var(--accent-deep);
    display:flex;align-items:center;gap:4px;font-weight:700;
  }
  .qtoggle .arr{transition:transform .25s;display:inline-block;}
  .card.open .qtoggle .arr{transform:rotate(90deg);}
  .qtext{font-size:1rem;font-weight:700;color:var(--ink);}

  .answer-peek{
    display:flex;align-items:center;gap:8px;margin-top:10px;
    font-size:.86rem;color:var(--ink-soft);
  }
  .ans-pill{
    background:var(--yes);color:#fff;font-weight:700;border-radius:20px;
    padding:2px 12px;font-size:.9rem;font-family:'Gaegu',cursive;letter-spacing:.05em;
    filter:blur(5px);transition:filter .25s;user-select:none;
  }
  .card.open .ans-pill{filter:blur(0);}
  .ans-hint{font-size:.75rem;opacity:.7;}
  .card.open .ans-hint{display:none;}

  .card-body{
    max-height:0;overflow:hidden;
    transition:max-height .35s ease;
    background:linear-gradient(180deg,#fffdf8,#fff);
  }
  .card.open .card-body{max-height:1400px;}
  .card-body-inner{
    padding:4px 16px 18px;border-top:2px dashed var(--line);margin:0 16px;
    padding-left:0;padding-right:0;
  }
  .kid{font-size:.95rem;color:var(--ink);line-height:1.85;padding-top:12px;}
  .kid b{color:var(--accent-deep);}
  .kid code{
    font-family:'Gaegu',monospace;background:var(--paper-2);
    padding:1px 6px;border-radius:6px;font-size:.92em;letter-spacing:.03em;
  }

  /* ===== empty state ===== */
  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
  }
  .empty .big{font-family:'Gaegu',cursive;font-size:1.8rem;color:var(--accent-deep);margin-bottom:6px;}

  /* ===== back to top ===== */
  .totop{
    position:fixed;right:20px;bottom:20px;z-index:60;
    width:50px;height:50px;border-radius:50%;border:2px solid var(--accent);
    background:#fff;color:var(--accent-deep);cursor:pointer;
    font-size:1.3rem;box-shadow:0 4px 0 var(--shadow);
    opacity:0;pointer-events:none;transition:opacity .2s;
    display:flex;align-items:center;justify-content:center;
  }
  .totop.show{opacity:1;pointer-events:auto;}
  .totop:hover{background:var(--accent);color:#fff;}

  footer{
    text-align:center;padding:30px 20px 50px;color:var(--ink-soft);font-size:.85rem;
  }
  footer .heart{color:var(--accent);}

  @media(max-width:560px){
    .grid{grid-template-columns:1fr;}
    .unit-head h2{font-size:1.2rem;}
    header{padding:34px 16px 22px;}
  }

  .color-rose{--c:#e0728a;} .color-amber{--c:#e0a13c;}
  .color-sky{--c:#5aa8d6;} .color-violet{--c:#a779c9;}
  .color-emerald{--c:#3fa86a;} .color-teal{--c:#3aa79a;}
  .color-lime{--c:#8aab3e;} .color-cyan{--c:#42a7b8;}
</style>
</head>
<body>

<header>
  <div class="eyebrow">高中生物・段考複習</div>
  <h1>把生物<span class="squig">學會</span></h1>
  <p class="subtitle">每一題都先看題目,想一想,再點開看超白話詳解</p>
  <div class="counter">
    <span><b id="cUnits">0</b> 個主題</span>
    <span><b id="cQs">0</b> 道題目</span>
    <span>點卡片 <b>翻開答案</b></span>
  </div>
</header>

<div class="tips">
  <div class="tips-card">
    <h3>🔑 萬用口訣(先記這幾條)</h3>
    <ul id="tipsList"></ul>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="search-row">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="搜尋關鍵字…例如:抗藥性、限制酶、DNA、達爾文">
      </div>
      <button class="clear-btn" id="clearBtn">清除</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>
</div>

<main id="main"></main>

<button class="totop" id="totop" aria-label="回到頂端">↑</button>

<footer>
  做給你複習用的 · 看不懂的題目把題號告訴我,我換個比喻再講一次 <span class="heart">♥</span>
</footer>

<script>
// 所有題目資料。每題:章節、題號、答案、題目、白話詳解(HTML)
const DATA = [
  {
    unit: "卷5 遺傳物質", uid: "u5", color: "rose",
    questions: [
      { no: "1", ans: "A", q: "真核生物用什麼當「遺傳訊息」?",
        kid: `想像生物身體裡有一本「使用說明書」,告訴身體要怎麼長。這本說明書是用 <b>DNA(去氧核糖核酸)</b> 做的。<br>• (B)RNA 是「影印本」,不是正本<br>• (C)(D)核苷酸是做說明書的「一個字母」,單獨看不懂<br>• (E)含氮鹼基是字母的「一小部分」,更看不懂<br>所以正本說明書 = <b>DNA</b>。` },
      { no: "2", ans: "C", q: "為什麼生命世界要用 DNA 當遺傳訊息?",
        kid: `因為 DNA 會「複製」(自己印出一份一模一樣的)。爸媽把說明書印給小孩,小孩就會長得像爸媽。<br>• (A)DNA 不會當酵素工作 ❌<br>• (B)DNA 還是會突變(會寫錯字)❌<br>• (D)DNA 不只在細胞核,粒線體、葉綠體也有 ❌<br>• (E)DNA 是雙股,一條有很多基因 ❌<br>正確:複製出來的兩份幾乎一樣 → 後代有相同特徵。` },
      { no: "3", ans: "B", q: "把核酸拆到最小,會找到哪些東西?",
        kid: `核酸有 DNA 和 RNA。拆開來數零件:<br>🧩 <b>核苷酸(整顆積木)</b>:DNA 4 種 + RNA 4 種 = <b>8 種</b><br>🧩 <b>含氮鹼基(積木的頭)</b>:A、T、G、C、U = <b>5 種</b><br>🧩 <b>五碳糖(身體)</b>:去氧核糖 + 核糖 = <b>2 種</b><br>🧩 <b>磷酸(腳)</b>:大家一樣 = <b>1 種</b><br>所以 8、5、2、1。` },
      { no: "4", ans: "C", q: "基因表現的過程,跟哪個東西最沒關係?",
        kid: `「基因表現」= 把說明書唸出來做出東西。需要:轉錄、轉譯、RNA 聚合酶、核糖體。<br>而 <b>DNA 聚合酶</b> 只在「DNA 複製」時上工(印說明書時才來),跟「唸說明書做東西」沒關係。` },
      { no: "5", ans: "A", q: "從北方墨點法的圖,胰臟癌細胞和正常細胞差在哪?",
        kid: `北方墨點法可以看 RNA 多不多,<b>顏色愈深 = RNA 愈多</b>。<br>癌細胞那排 EGF 顏色比較深 → 癌細胞的 <b>EGF RNA 比較多</b>。<br>(7S 那排是對照用的,兩邊差不多,證明實驗有做對。)` },
      { no: "6", ans: "D", q: "關於這個實驗設計,哪個說法對?",
        kid: `• <b>操縱變因</b>(故意改的)= 細胞癌化與否<br>• <b>應變變因</b>(去測的)= EGF RNA 的量<br>• <b>控制變因</b>(要一樣的)= 放進去的總 RNA 量<br>(D)說 7S RNA 代表放入的總 RNA 量類似 → 確認兩邊放的量一樣多才公平 ✅` },
    ]
  },
  {
    unit: "卷6 基因轉殖", uid: "u6", color: "amber",
    intro: "🖼️ 圖:甲乙丙是三種酵素(剪刀和膠水),丁己是 DNA。把目標基因剪下來,黏進圓圈圈(載體)變成「丁」(重組DNA),再送進大腸桿菌(戊)裡。",
    questions: [
      { no: "1", ans: "A", q: "關於甲、乙、丙三個酵素的敘述,哪個對?",
        kid: `甲和乙都在「剪 DNA」,丙在「黏 DNA」。<br>• (A)甲和乙是相同酵素 ✅(都是剪刀)<br>• (B)乙能連接 DNA ❌(乙是剪刀不是膠水)<br>• (C)丙能辨認序列切割 ❌(丙是膠水)<br>• (D)只能在細菌裡用 ❌(試管也能)<br>• (E)人類細胞也有 ❌(這是細菌的工具)` },
      { no: "2", ans: "B", q: "丁被叫做什麼?",
        kid: `丁 = 把「目標基因」黏進「圓圈圈(載體)」之後的新繩子。把兩段繩子黏在一起變成新的一條 → <b>重組DNA</b>。` },
      { no: "3", ans: "C", q: "丁和己比較,哪個對?",
        kid: `丁=重組DNA(要送進去的繩子),己=染色體(細菌本來的繩子)。<br>• (A)丁比己大 ❌(丁小己大)<br>• (B)丁要插入己才能表現 ❌<br>• (C)丁利用細胞裡的酵素和核糖體做表現 ✅<br>• (D)丁進去後己會消失 ❌<br>• (E)丁環狀己線狀 ❌(兩個都環狀)` },
      { no: "4", ans: "C", q: "關於戊細胞(大腸桿菌),哪個對?",
        kid: `• (A)每個戊都拿到丁 ❌<br>• (B)抗生素分解基因可把戊殺死 ❌(相反,是讓戊不怕)<br>• (C)戊是原核,丁也可轉殖到真核生物 ✅<br>• (D)需高基氏體修飾的蛋白適合用戊 ❌(細菌沒高基氏體)<br>• (E)轉殖後可隨便丟 ❌` },
      { no: "5", ans: "D", q: "為什麼基因搬到 B 生物,B 還能做出正確產物?",
        kid: `因為<b>所有生物都用同一套規則</b>(中心法則:DNA→RNA→蛋白質)。像全世界都用同一種食譜步驟煮菜,給別人也能煮出一樣的菜。<br>• (A)都有細胞核 ❌(細菌沒有)<br>• (B)都用蛋白質記錄遺傳 ❌(用 DNA)<br>• (D)都執行中心法則 ✅` },
      { no: "6", ans: "A", q: "想讓作物有「抗蟲」能力,要轉殖哪種蛋白?",
        kid: `• (A)蘇力菌的毒蛋白 ✅(只毒蟲蟲)<br>• (B)胡蘿蔔素 ❌(增加營養)<br>• (C)水母螢光 ❌(讓作物發光)<br>• (D)抗殺草劑 ❌(不怕除草劑)<br>• (E)人類凝血因子 ❌(做藥用)` },
      { no: "7", ans: "C", q: "承上題,這種抗蟲作物可能造成什麼壞處?",
        kid: `• (A)人吃了腸道崩解 ❌(只毒蟲蟲)<br>• (B)減少農藥 ❌(這是好處)<br>• (C)花粉飄到別的植物,讓吃那株的蟲也受影響 ✅<br>• (D)讓作物長更快 ❌<br>• (E)不會有壞處 ❌` },
      { no: "8", ans: "E", q: "基因轉殖生物的貢獻,「不包含」哪個?",
        kid: `好處有:動物長快長肉多、微生物做胰島素、農作物不易腐壞、減少病蟲害。<br>• (E)保存原生物種遺傳多樣性、增加物種多樣性 ❌ → 基改生物跟原本同一種,<b>不會增加物種多樣性</b>。題目問「不包含」,選 (E)。` },
      { no: "9", ans: "E", q: "創造「有人類凝血因子基因的山羊—寶鈺」,經過哪個過程?",
        kid: `寶鈺是身上有「人類凝血因子基因」的羊。所以是把 <b>人類的凝血因子 DNA</b> 放進寶鈺的 DNA 裡。要放的是 DNA(不是 RNA、不是蛋白質),方向:人類 → 寶鈺。` },
      { no: "10", ans: "B", q: "關於基因轉殖鮭魚的文章,哪個對?",
        kid: `基改鮭魚有「太平洋帝王鮭生長激素基因」+「大洋鱈魚啟動子」,全年無休長大。<br>• (B)會產生太平洋帝王鮭的生長激素 ✅<br>• (C)野生鮭魚有鱈魚啟動子 ❌(是基改才有)<br>• (D)生長期有季節性 ❌(全年都長)<br>• (E)FDA 是研發者 ❌(只負責核准)` },
      { no: "11", ans: "D", q: "看「基改 vs 正常鮭魚」生長比較圖,哪個對?",

<script>
  const main = document.getElementById('main');
  const chipsBox = document.getElementById('chips');
  const searchInput = document.getElementById('search');
  const tipsList = document.getElementById('tipsList');
  let activeUnit = 'all';
  let keyword = '';

  // counters
  document.getElementById('cUnits').textContent = DATA.length;
  document.getElementById('cQs').textContent = DATA.reduce((s,u)=>s+u.questions.length,0);

  // tips
  TIPS.forEach(t=>{ const li=document.createElement('li'); li.textContent=t; tipsList.appendChild(li); });

  // chips
  function buildChips(){
    const allChip = chip('全部', 'all');
    chipsBox.appendChild(allChip);
    DATA.forEach(u=>chipsBox.appendChild(chip(u.unit, u.uid)));
  }
  function chip(label, id){
    const b=document.createElement('button');
    b.className='chip'+(id==='all'?' active':'');
    b.textContent=label; b.dataset.id=id;
    b.onclick=()=>{
      activeUnit=id;
      document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c.dataset.id===id));
      render();
      if(id!=='all'){ const el=document.getElementById('unit-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }
      else window.scrollTo({top:0,behavior:'smooth'});
    };
    return b;
  }

  function highlight(text, kw){
    if(!kw) return text;
    try{
      const re=new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
      return text.replace(re,'<mark style="background:#ffe08a;border-radius:3px;padding:0 2px;">$1</mark>');
    }catch(e){return text;}
  }

  function matches(q, u){
    if(!keyword) return true;
    const hay=(u.unit+' '+q.no+' '+q.ans+' '+q.q+' '+q.kid).toLowerCase();
    return hay.includes(keyword.toLowerCase());
  }

  function render(){
    main.innerHTML='';
    let shown=0;
    const units = activeUnit==='all' ? DATA : DATA.filter(u=>u.uid===activeUnit);

    units.forEach(u=>{
      const qs=u.questions.filter(q=>matches(q,u));
      if(qs.length===0) return;
      shown+=qs.length;

      const sec=document.createElement('section');
      sec.className='unit color-'+u.color;
      sec.id='unit-'+u.uid;

      const head=document.createElement('div');
      head.className='unit-head';
      head.innerHTML='<span class="dot" style="background:var(--c)"></span>'+
        '<h2>'+u.unit+'</h2><span class="qn">'+qs.length+' 題</span>';
      sec.appendChild(head);

      if(u.intro){
        const intro=document.createElement('div');
        intro.className='intro';
        intro.style.borderLeftColor='var(--c)';
        intro.innerHTML=u.intro;
        sec.appendChild(intro);
      }

      const grid=document.createElement('div');
      grid.className='grid';
      qs.forEach(q=>grid.appendChild(card(q,u)));
      sec.appendChild(grid);
      main.appendChild(sec);
    });

    if(shown===0){
      main.innerHTML='<div class="empty"><div class="big">找不到「'+keyword+'」</div><p>換個關鍵字試試,或點上面「全部」</p></div>';
    }
  }

  function card(q,u){
    const c=document.createElement('div');
    c.className='card';
    const ansShort = q.ans.length>14 ? q.ans : q.ans;
    c.innerHTML=
      '<div class="card-top">'+
        '<div class="qmeta">'+
          '<span class="qbadge">'+q.no+'</span>'+
          '<span class="qtoggle"><span class="arr">▶</span> 翻開</span>'+
        '</div>'+
        '<div class="qtext">'+highlight(q.q,keyword)+'</div>'+
        '<div class="answer-peek"><span style="font-size:.8rem;">答案</span>'+
          '<span class="ans-pill">'+q.ans+'</span>'+
          '<span class="ans-hint">(點卡片看)</span>'+
        '</div>'+
      '</div>'+
      '<div class="card-body"><div class="card-body-inner"><div class="kid">'+q.kid+'</div></div></div>';
    c.querySelector('.card-top').onclick=()=>c.classList.toggle('open');
    return c;
  }

  // search
  let t;
  searchInput.addEventListener('input',e=>{
    clearTimeout(t);
    t=setTimeout(()=>{ keyword=e.target.value.trim(); render(); },180);
  });
  document.getElementById('clearBtn').onclick=()=>{
    searchInput.value=''; keyword=''; render(); searchInput.focus();
  };

  // back to top
  const totop=document.getElementById('totop');
  window.addEventListener('scroll',()=>{
    totop.classList.toggle('show', window.scrollY>500);
  });
  totop.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

  buildChips();
  render();
</script>
</body>
</html>
